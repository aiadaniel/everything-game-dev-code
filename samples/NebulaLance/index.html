<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#05070f" />
    <title>Nebula Lance</title>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>

      <div id="hud" class="hidden">
        <div class="hud-top">
          <div class="hud-chip" id="hud-lives" aria-label="Lives">◈◈◈</div>
          <div class="hud-chip" id="hud-score" aria-label="Score">000000</div>
          <div class="hud-chip combo" id="hud-combo"></div>
          <div class="hud-actions">
            <button id="btn-pause" class="icon-btn" aria-label="Pause">II</button>
            <button id="btn-mute" class="icon-btn" aria-label="Mute">&#9835;</button>
          </div>
        </div>

        <div id="boss-bar-wrap" class="hidden">
          <div class="boss-label">THE MAW</div>
          <div class="boss-track"><div id="boss-bar"></div></div>
        </div>

        <div id="charge-wrap">
          <div id="hud-force"></div>
          <div class="charge-track"><div id="charge-fill"></div></div>
        </div>

        <div id="touch-controls">
          <button id="btn-fire" class="touch-btn fire">FIRE</button>
          <div class="force-col">
            <button id="btn-force-launch" class="touch-btn small">LAUNCH</button>
            <button id="btn-force-side" class="touch-btn small">FORCE</button>
          </div>
        </div>
      </div>

      <div id="overlay">
        <video
          id="intro-video"
          autoplay
          muted
          loop
          playsinline
          src="./assets/video/intro.mp4"
          poster="./assets/img/menu-keyart.png"
        ></video>
        <div class="panel" id="overlay-panel">
          <h1 id="overlay-title">NEBULA LANCE</h1>
          <p id="overlay-sub"></p>
          <p id="overlay-score" class="hidden"></p>
          <p id="overlay-high"></p>
          <button id="btn-primary" class="big-btn">Launch</button>
          <button id="btn-tomenu" class="big-btn secondary hidden">Main menu</button>
          <p class="hint">
            Drag to fly &middot; hold FIRE to charge the Wave Cannon &middot; FORCE toggles front/rear, LAUNCH sends it out
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
