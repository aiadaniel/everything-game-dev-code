<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0f17" />
  <title>Los Renacidos — Ecos de Talasaria</title>
  <style>
    :root {
      --bg: #0a0f17;
      --fg: #d6c79a;
      --accent: #f5c66b;
      --danger: #c0392b;
      --magic: #7ec8ff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Georgia', 'Times New Roman', serif;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 8px;
    }
    canvas {
      background: var(--bg);
      image-rendering: pixelated;
      max-width: 100%;
      max-height: 100vh;
      box-shadow: 0 0 32px rgba(245, 198, 107, 0.08);
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game" width="960" height="600"></canvas>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
